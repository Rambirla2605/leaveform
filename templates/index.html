<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Leave Approval System</title>
  <meta name="description" content="Secure login for the College Leave Approval System. Students and staff can sign in here.">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">📋</div>
        <h1>LeavePortal</h1>
        <p>College Leave Approval System</p>
      </div>

      <h2>Welcome Back</h2>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="25ecXXX@drngpit.ac.in" autocomplete="email" required>
          <div id="emailError" class="error-msg">Please enter a valid email address.</div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="password-toggle" id="toggleIcon" onclick="togglePassword('password','toggleIcon')" aria-label="Toggle password">👁️</button>
          <div id="passwordError" class="error-msg">Password is required.</div>
        </div>
        <button type="submit" id="loginBtn" class="btn-primary mt-4">Sign In</button>
      </form>

      <div class="text-center mt-4">
        <a href="#" id="forgotPasswordLink" class="text-sm font-semibold">Forgot Password?</a>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotPasswordModal" class="modal-overlay">
    <div class="modal-content auth-card" style="padding: 30px; animation: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h2 style="margin: 0;">Reset Password</h2>
        <button id="closeForgotModal" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--muted); padding: 0;">&times;</button>
      </div>
      <p class="text-sm text-muted mb-4" style="text-align: left;">Enter your email address to request a password reset from the administrator.</p>
      <form id="forgotPasswordForm" novalidate>
        <div class="form-group">
          <label for="forgotEmail">Email Address</label>
          <input type="email" id="forgotEmail" placeholder="Enter your email" required>
        </div>
        <button type="submit" id="forgotBtn" class="btn-primary mt-2">Submit Request</button>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const emailErr = document.getElementById('emailError');
      const passErr  = document.getElementById('passwordError');

      emailErr.style.display = 'none';
      passErr.style.display  = 'none';

      let valid = true;
      if (!email) { emailErr.style.display = 'block'; valid = false; }
      if (!password) { passErr.style.display = 'block'; valid = false; }
      if (!valid) return;

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || 'Login failed', 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In';
          return;
        }

        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('email', email);

        if (data.first_login)        window.location.href = '/change-password';
        else if (data.role==='staff') window.location.href = '/staff';
        else if (!data.has_details)   window.location.href = '/student-details';
        else                          window.location.href = '/calendar';
      } catch {
        showToast('Network error. Please try again.', 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });

    // Forgot Password Logic
    const forgotModal = document.getElementById('forgotPasswordModal');
    const forgotLink = document.getElementById('forgotPasswordLink');
    const closeForgotModal = document.getElementById('closeForgotModal');
    const forgotForm = document.getElementById('forgotPasswordForm');
    const forgotBtn = document.getElementById('forgotBtn');

    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      forgotModal.classList.add('active');
    });

    closeForgotModal.addEventListener('click', () => {
      forgotModal.classList.remove('active');
    });

    forgotModal.addEventListener('click', (e) => {
      if(e.target === forgotModal) forgotModal.classList.remove('active');
    });

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      if (!email) return;

      forgotBtn.disabled = true;
      forgotBtn.textContent = 'Submitting...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || data.message || 'Request failed', 'error');
        } else {
          showToast(data.message, 'success');
          forgotModal.classList.remove('active');
          forgotForm.reset();
        }
      } catch {
        showToast('Network error. Please try again.', 'error');
      } finally {
        forgotBtn.disabled = false;
        forgotBtn.textContent = 'Submit Request';
      }
    });
  </script>
</body>
</html>
