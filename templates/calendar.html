<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply Leave – LeavePortal</title>
  <meta name="description" content="Student dashboard to apply for leave and track your requests.">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/calender.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <!-- TOP NAVBAR -->
  <nav class="site-navbar">
    <div class="navbar-brand">
      <div class="brand-icon">📋</div>
      <span>LeavePortal</span>
    </div>
    <div class="navbar-center"></div>
    <div class="navbar-user">
      <div class="session-timer" id="sessionTimer">⏱ 10:00</div>
      <div class="user-info">
        <div class="user-name" id="navUserName">Student</div>
        <div class="user-role">Student</div>
      </div>
      <div class="avatar" id="navAvatar">S</div>
      <button class="btn-ghost btn-sm" onclick="logout()" style="margin-left:8px;">Logout</button>
    </div>
  </nav>

  <!-- PAGE BODY -->
  <div style="padding-top: var(--navbar-h);">
    <div style="max-width:720px; margin:0 auto; padding:28px 16px;">

      <!-- Student info banner -->
      <div class="card" style="margin-bottom:20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
        <div style="font-size:36px;">👨‍🎓</div>
        <div>
          <div style="font-size:17px; font-weight:600; color:var(--navy);" id="studentName">Loading…</div>
          <div class="text-muted text-sm" id="studentReg"></div>
          <div class="text-muted text-sm" id="studentDept"></div>
        </div>
      </div>

      <!-- CALENDAR CARD -->
      <div class="calendar-card">
        <div class="calendar-header">
          <button class="calendar-nav" id="prevMonth" aria-label="Previous month">&#8249;</button>
          <h3 id="monthYear"></h3>
          <button class="calendar-nav" id="nextMonth" aria-label="Next month">&#8250;</button>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="selection-info">
          <span class="counter" id="counterText">0 date(s) selected</span>
          <button id="clearBtn" class="btn-ghost btn-sm" style="display:none;" onclick="clearSelection()">✕ Clear</button>
        </div>

        <div class="reason-section">
          <label for="leaveReason">Reason for leave</label>
          <textarea id="leaveReason" rows="3" placeholder="Please enter a valid reason…"></textarea>
        </div>

        <button id="submitLeaveBtn" class="btn-primary mt-4" disabled>Submit Leave Request</button>
      </div>

      <!-- MY LEAVE REQUESTS -->
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:16px;">
          <div>
            <h3 style="font-size:17px; color:var(--navy);">My Leave Requests</h3>
            <p class="text-muted text-sm">Track your submitted requests</p>
          </div>
          <button class="btn-ghost btn-sm" onclick="downloadStudentPDF()">⬇ Download PDF</button>
        </div>
        <div id="myLeavesList"></div>
      </div>

    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if (!sessionStorage.getItem('token')) window.location.href = '/';

    // Session countdown
    let timeoutSeconds = 600;
    const timerEl = document.getElementById('sessionTimer');
    const timerInterval = setInterval(() => {
      timeoutSeconds--;
      const m = Math.floor(timeoutSeconds / 60);
      const s = timeoutSeconds % 60;
      timerEl.textContent = `⏱ ${m}:${s < 10 ? '0' : ''}${s}`;
      if (timeoutSeconds <= 0) { sessionStorage.clear(); window.location.href = '/'; }
    }, 1000);

    function downloadStudentPDF() {
      const el = document.getElementById('myLeavesList');
      if (!el || el.querySelector('.empty-state')) { showToast('No data to download', 'info'); return; }
      html2pdf().set({
        margin: 1,
        filename: 'My_Leave_Requests.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
      }).from(el).save();
    }

    // Calendar state
    let currentDate = new Date();
    let selectedDates = new Set();
    let existingLeaveDates = new Set();
    const today = new Date(); today.setHours(0,0,0,0);

    function renderCalendar() {
      const year  = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay  = new Date(year, month + 1, 0);

      document.getElementById('monthYear').textContent =
        firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'day-name';
        el.textContent = d;
        grid.appendChild(el);
      });

      for (let i = 0; i < firstDay.getDay(); i++) {
        const el = document.createElement('div');
        el.className = 'calendar-day empty';
        grid.appendChild(el);
      }

      for (let d = 1; d <= lastDay.getDate(); d++) {
        const dateObj = new Date(year, month, d);
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const el = document.createElement('div');
        el.className = 'calendar-day';
        el.textContent = d;

        if (dateObj < today) {
          el.classList.add('past');
        } else if (existingLeaveDates.has(dateStr)) {
          el.classList.add('has-leave');
          el.title = 'Leave already submitted';
        } else {
          if (dateObj.getTime() === today.getTime()) el.classList.add('today');
          if (selectedDates.has(dateStr)) el.classList.add('selected');
          el.onclick = () => toggleDate(dateStr, el);
        }
        grid.appendChild(el);
      }
    }

    function toggleDate(dateStr, el) {
      if (selectedDates.has(dateStr)) { selectedDates.delete(dateStr); el.classList.remove('selected'); }
      else { selectedDates.add(dateStr); el.classList.add('selected'); }
      updateUI();
    }

    function clearSelection() { selectedDates.clear(); renderCalendar(); updateUI(); }

    function updateUI() {
      const count = selectedDates.size;
      document.getElementById('counterText').textContent = `${count} date(s) selected`;
      document.getElementById('clearBtn').style.display = count > 0 ? 'block' : 'none';
      document.getElementById('submitLeaveBtn').disabled = count === 0;
    }

    document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); };
    document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); };

    document.getElementById('submitLeaveBtn').onclick = () => {
      const reason = document.getElementById('leaveReason').value.trim();
      if (!reason) { showToast('Please enter a reason for your leave.', 'error'); return; }
      const datesArray = Array.from(selectedDates).sort();
      showModal(`Submit leave for ${datesArray.length} date(s)?\n\nReason: "${reason}"`, async () => {
        const btn = document.getElementById('submitLeaveBtn');
        btn.disabled = true; btn.textContent = 'Submitting…';
        try {
          const res  = await authFetch('/api/student/leave', { method: 'POST', body: JSON.stringify({ dates: datesArray, reason }) });
          const data = await res.json();
          if (res.ok) {
            showToast('Leave request submitted!', 'success');
            setTimeout(async () => {
              await loadMyLeaves();
              clearSelection();
              document.getElementById('leaveReason').value = '';
              btn.disabled = false; btn.textContent = 'Submit Leave Request';
            }, 1400);
          } else {
            showToast(data.error || 'Submission failed', 'error');
            btn.disabled = false; btn.textContent = 'Submit Leave Request';
          }
        } catch { showToast('Network error', 'error'); btn.disabled = false; btn.textContent = 'Submit Leave Request'; }
      });
    };

    async function loadMyLeaves() {
      try {
        const res = await authFetch('/api/student/leaves');
        if (!res.ok) return;
        const leaves = await res.json();
        existingLeaveDates.clear();
        const container = document.getElementById('myLeavesList');
        container.innerHTML = '';

        if (leaves.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No leave requests yet.</p></div>';
          return;
        }

        leaves.forEach(l => {
          l.date.split(', ').forEach(d => existingLeaveDates.add(d));
          const div = document.createElement('div');
          div.className = 'my-leave-item';
          const colors = { approved: 'var(--success)', rejected: 'var(--danger)', pending: 'var(--accent)' };
          div.innerHTML = `
            <div>
              <div class="my-leave-dates">📅 ${l.date}</div>
              <div class="my-leave-reason">Reason: ${l.reason}</div>
            </div>
            <span class="status-badge bg-${l.status}">${l.status.toUpperCase()}</span>
          `;
          container.appendChild(div);
        });
        renderCalendar();
      } catch (e) { console.error(e); }
    }

    async function loadInitialData() {
      try {
        const meRes = await authFetch('/api/student/me');
        if (meRes.ok) {
          const me = await meRes.json();
          document.getElementById('studentName').textContent = me.name || 'Student';
          document.getElementById('studentReg').textContent  = `Reg: ${me.reg_number}`;
          document.getElementById('studentDept').textContent = me.department || '';
          const initial = (me.name || 'S').charAt(0).toUpperCase();
          document.getElementById('navAvatar').textContent   = initial;
          document.getElementById('navUserName').textContent = me.name || 'Student';
        }
        await loadMyLeaves();
        renderCalendar();
      } catch (e) { console.error(e); }
    }

    loadInitialData();
  </script>
</body>
</html>
