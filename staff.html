<!DOCTYPE html>
<html>
<head>
  <title>Staff Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Staff Panel</h2>

  <a href="#" onclick="showPage('dashboard')">Dashboard</a>
  <a href="#" onclick="showPage('leaves')">
  Leave Requests <span id="notifBadge"></span>
</a>
  <a href="#" onclick="showPage('history')">History</a>
  <a href="#" onclick="logout()">Logout</a>
  
</div>

<!-- Main Content -->
<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page">
    <div class="header">
      <h2>Staff Dashboard</h2>
      <h3 id="todayCount"></h3>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Approved</h3>
        <p class="approved">0</p>
      </div>

      <div class="card">
        <h3>Pending</h3>
        <p class="pending">0</p>
      </div>

      <div class="card">
        <h3>Rejected</h3>
        <p class="rejected">0</p>
      </div>
    </div>
  </div>

  <!-- LEAVE REQUESTS -->
  <div id="leaves" class="page">
    <h2>Leave Requests</h2>
    <div id="leaveList"></div>
  </div>

  <!-- HISTORY -->
  <div id="history" class="page">
    <h2>History</h2>
    <div id="historyList"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
