<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Leave Approval System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="center-container">
        <div class="card auth-card">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                    <div id="emailError" class="error-msg"></div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" id="toggleIcon" onclick="togglePassword('password', 'toggleIcon')">👁️</button>
                    <div id="passwordError" class="error-msg"></div>
                </div>
                <button type="submit" id="loginBtn" class="btn-primary mt-4">Login</button>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            
            emailError.style.display = 'none';
            passwordError.style.display = 'none';

            // Basic validation
            let valid = true;
            if (!email) {
                emailError.textContent = 'Email is required';
                emailError.style.display = 'block';
                valid = false;
            }
            if (!password) {
                passwordError.textContent = 'Password is required';
                passwordError.style.display = 'block';
                valid = false;
            }
            if (!valid) return;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'Login failed', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                    return;
                }

                sessionStorage.setItem('token', data.token);
                sessionStorage.setItem('email', email);

                if (data.first_login) {
                    window.location.href = '/change-password';
                } else if (data.role === 'staff') {
                    window.location.href = '/staff';
                } else if (!data.has_details) {
                    window.location.href = '/student-details';
                } else {
                    window.location.href = '/calendar';
                }
            } catch (err) {
                showToast('An error occurred', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
