<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Leave - Leave Approval System</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/calender.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="header-bar">
        <div>
            <h3>Apply for Leave</h3>
            <div id="studentInfo" style="font-size: 14px; color: var(--muted); margin-top: 4px;"></div>
            <div id="timeoutDisplay" style="font-size: 12px; color: var(--danger); margin-top: 2px;">Session expires in 10:00</div>
        </div>
        <button class="btn-ghost" onclick="logout()">Logout</button>
    </div>

    <div class="calendar-container card">
        <div class="calendar-header">
            <button class="calendar-nav" id="prevMonth">&lt;</button>
            <h3 id="monthYear"></h3>
            <button class="calendar-nav" id="nextMonth">&gt;</button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <!-- Days will be generated here -->
        </div>

        <div class="selection-info">
            <span id="counterText" class="counter">0 date(s) selected</span>
            <button id="clearBtn" class="btn-ghost" style="display: none;" onclick="clearSelection()">Clear Selection</button>
        </div>

        <div class="reason-section">
            <label for="leaveReason" style="display:block; margin-bottom:8px; color:var(--muted)">Reason for leave</label>
            <textarea id="leaveReason" rows="3" placeholder="Enter valid reason..."></textarea>
        </div>

        <button id="submitLeaveBtn" class="btn-primary mt-4" disabled>Submit Leave Request</button>

        <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h3>My Leave Requests</h3>
            <button class="btn-ghost" onclick="downloadStudentPDF()">Download PDF</button>
        </div>
        <div id="myLeavesList" style="margin-top: 15px;"></div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if (!sessionStorage.getItem('token')) {
            window.location.href = '/';
        }

        let timeoutSeconds = 600;
        setInterval(() => {
            timeoutSeconds--;
            let m = Math.floor(timeoutSeconds / 60);
            let s = timeoutSeconds % 60;
            document.getElementById('timeoutDisplay').textContent = `Session expires in ${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeoutSeconds <= 0) {
                sessionStorage.clear();
                window.location.href = '/';
            }
        }, 1000);

        function downloadStudentPDF() {
            const element = document.getElementById('myLeavesList');
            const opt = {
                margin:       1,
                filename:     'My_Leave_Requests.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        let currentDate = new Date();
        let selectedDates = new Set();
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            
            document.getElementById('monthYear').textContent = firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                const div = document.createElement('div');
                div.className = 'day-name';
                div.textContent = day;
                grid.appendChild(div);
            });

            for (let i = 0; i < firstDay.getDay(); i++) {
                const div = document.createElement('div');
                div.className = 'calendar-day empty';
                grid.appendChild(div);
            }

            for (let d = 1; d <= lastDay.getDate(); d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                
                const div = document.createElement('div');
                div.className = 'calendar-day';
                div.textContent = d;
                
                if (dateObj < today) {
                    div.classList.add('past');
                } else if (existingLeaveDates.has(dateStr)) {
                    div.classList.add('past');
                    div.title = 'Leave already requested';
                } else {
                    if (dateObj.getTime() === today.getTime()) {
                        div.classList.add('today');
                    }
                    if (selectedDates.has(dateStr)) {
                        div.classList.add('selected');
                    }
                    
                    div.onclick = () => toggleDate(dateStr, div);
                }
                
                grid.appendChild(div);
            }
        }

        function toggleDate(dateStr, element) {
            if (selectedDates.has(dateStr)) {
                selectedDates.delete(dateStr);
                element.classList.remove('selected');
            } else {
                selectedDates.add(dateStr);
                element.classList.add('selected');
            }
            updateUI();
        }

        function clearSelection() {
            selectedDates.clear();
            renderCalendar();
            updateUI();
        }

        function updateUI() {
            const count = selectedDates.size;
            document.getElementById('counterText').textContent = `${count} date(s) selected`;
            document.getElementById('clearBtn').style.display = count > 0 ? 'block' : 'none';
            document.getElementById('submitLeaveBtn').disabled = count === 0;
        }

        document.getElementById('prevMonth').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        };

        document.getElementById('nextMonth').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        };

        document.getElementById('submitLeaveBtn').onclick = () => {
            const reason = document.getElementById('leaveReason').value.trim();
            if (!reason) {
                showToast('Please enter a reason', 'error');
                return;
            }

            const datesArray = Array.from(selectedDates).sort();
            
            showModal(`You are submitting leave for ${datesArray.length} date(s). Reason: ${reason}. Confirm?`, async () => {
                const btn = document.getElementById('submitLeaveBtn');
                btn.disabled = true;
                btn.textContent = 'Submitting...';

                try {
                    const res = await authFetch('/api/student/leave', {
                        method: 'POST',
                        body: JSON.stringify({ dates: datesArray, reason })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok) {
                        showToast(`Successfully submitted leave request`, 'success');
                        setTimeout(async () => {
                            await loadMyLeaves();
                            clearSelection();
                            document.getElementById('leaveReason').value = '';
                            btn.disabled = false;
                            btn.textContent = 'Submit Leave Request';
                        }, 1500);
                    } else {
                        showToast(data.error || 'Submission failed', 'error');
                        btn.disabled = false;
                        btn.textContent = 'Submit Leave Request';
                    }
                } catch (e) {
                    showToast('An error occurred', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Submit Leave Request';
                }
            });
        };

        let existingLeaveDates = new Set();
        let myLeavesData = [];

        async function loadInitialData() {
            try {
                const meRes = await authFetch('/api/student/me');
                if (meRes.ok) {
                    const me = await meRes.json();
                    document.getElementById('studentInfo').textContent = `${me.name} (${me.reg_number})`;
                }

                await loadMyLeaves();
                renderCalendar();
            } catch (e) { console.error(e); }
        }

        async function loadMyLeaves() {
            try {
                const res = await authFetch('/api/student/leaves');
                if (res.ok) {
                    const leaves = await res.json();
                    myLeavesData = leaves;
                    const container = document.getElementById('myLeavesList');
                    container.innerHTML = '';
                    existingLeaveDates.clear();

                    if (leaves.length === 0) {
                        container.innerHTML = '<p style="color:var(--muted)">No leave requests found.</p>';
                        return;
                    }

                    leaves.forEach(l => {
                        l.date.split(', ').forEach(d => existingLeaveDates.add(d));
                        
                        const div = document.createElement('div');
                        div.style.padding = '12px';
                        div.style.border = '1px solid var(--border)';
                        div.style.borderRadius = 'var(--radius)';
                        div.style.marginBottom = '10px';
                        
                        let color = 'var(--accent)';
                        if (l.status === 'approved') color = 'var(--success)';
                        if (l.status === 'rejected') color = 'var(--danger)';

                        div.innerHTML = `
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <strong>Dates: ${l.date}</strong>
                                <span style="color: ${color}; font-weight: 500;">${l.status.toUpperCase()}</span>
                            </div>
                            <p style="color:var(--muted); font-size:14px;">Reason: ${l.reason}</p>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (e) { console.error(e); }
        }

        loadInitialData();
    </script>
</body>
</html>
