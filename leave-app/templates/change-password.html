<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password – LeavePortal</title>
  <meta name="description" content="Set your new password to continue using the Leave Portal.">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🔐</div>
        <h1>LeavePortal</h1>
        <p>Set your new password</p>
      </div>

      <h2>Change Password</h2>
      <p class="text-center text-sm text-muted mb-4">
        This is your first login. Please set a strong password to continue.
      </p>

      <form id="changePasswordForm" novalidate>
        <div class="form-group">
          <label for="new_password">New Password</label>
          <input type="password" id="new_password" placeholder="Minimum 8 characters" required>
          <button type="button" class="password-toggle" id="toggleNew" onclick="togglePassword('new_password','toggleNew')" aria-label="Toggle">👁️</button>
          <div id="passwordStrength" style="font-size:13px;margin-top:6px;font-weight:500;"></div>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" placeholder="Re-enter password" required>
          <button type="button" class="password-toggle" id="toggleConfirm" onclick="togglePassword('confirm_password','toggleConfirm')" aria-label="Toggle">👁️</button>
          <div id="matchError" class="error-msg">Passwords do not match.</div>
        </div>

        <!-- Strength bar -->
        <div style="height:5px;background:var(--border);border-radius:99px;margin:-8px 0 16px;overflow:hidden;">
          <div id="strengthBar" style="height:100%;width:0%;border-radius:99px;transition:width .3s,background .3s;"></div>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary mt-4">Update Password</button>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if (!sessionStorage.getItem('token')) window.location.href = '/';

    let isStrong = false;

    document.getElementById('new_password').addEventListener('input', (e) => {
      const val = e.target.value;
      const minLen    = val.length >= 8;
      const hasLetter = /[a-zA-Z]/.test(val);
      const hasNumber = /[0-9]/.test(val);
      const hasSpec   = /[!@#$%^&*(),.?":{}|<>]/.test(val);

      let strength = 0;
      if (minLen) strength++;
      if (hasLetter && hasNumber) strength++;
      if (hasSpec) strength++;

      const bar  = document.getElementById('strengthBar');
      const text = document.getElementById('passwordStrength');

      if (!val) { bar.style.width='0%'; text.textContent=''; isStrong=false; return; }

      const levels = [
        { w:'33%', bg:'#dc2626', label:'Weak password', color:'#dc2626' },
        { w:'66%', bg:'#d97706', label:'Medium password', color:'#d97706' },
        { w:'100%',bg:'#16a34a', label:'Strong password ✓', color:'#16a34a' },
      ];
      const l = levels[strength - 1] || levels[0];
      bar.style.width = l.w;
      bar.style.background = l.bg;
      text.textContent = l.label;
      text.style.color = l.color;
      isStrong = (strength === 3);
    });

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const new_password     = document.getElementById('new_password').value;
      const confirm_password = document.getElementById('confirm_password').value;
      const matchErr  = document.getElementById('matchError');
      const submitBtn = document.getElementById('submitBtn');

      matchErr.style.display = 'none';
      if (new_password !== confirm_password) { matchErr.style.display = 'block'; return; }
      if (!isStrong) {
        showToast('Password must be 8+ chars with letters, numbers & symbols.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating…';

      try {
        const res  = await authFetch('/api/auth/change-password', {
          method: 'POST',
          body: JSON.stringify({ new_password, confirm_password })
        });
        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || 'Failed to update password', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
          return;
        }
        showToast('Password updated! Redirecting…', 'success');
        setTimeout(() => { sessionStorage.clear(); window.location.href = '/'; }, 1600);
      } catch {
        showToast('Network error', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
