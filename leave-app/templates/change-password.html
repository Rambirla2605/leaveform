<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Leave Approval System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="center-container">
        <div class="card auth-card">
            <h2>Change Password</h2>
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" required>
                    <button type="button" class="password-toggle" id="toggleNew" onclick="togglePassword('new_password', 'toggleNew')">👁️</button>
                    <div id="passwordStrength" style="font-size: 14px; margin-top: 5px; font-weight: 500;"></div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" required>
                    <button type="button" class="password-toggle" id="toggleConfirm" onclick="togglePassword('confirm_password', 'toggleConfirm')">👁️</button>
                    <div id="matchError" class="error-msg">Passwords do not match</div>
                </div>
                <button type="submit" id="submitBtn" class="btn-primary mt-4">Update Password</button>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if (!sessionStorage.getItem('token')) {
            window.location.href = '/';
        }

        let isStrongPassword = false;

        document.getElementById('new_password').addEventListener('input', (e) => {
            const val = e.target.value;
            const minLength = val.length >= 8;
            const hasLetter = /[a-zA-Z]/.test(val);
            const hasNumber = /[0-9]/.test(val);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(val);
            
            let strength = 0;
            if (minLength) strength++;
            if (hasLetter && hasNumber) strength++;
            if (hasSpecial) strength++;

            const strengthDiv = document.getElementById('passwordStrength');
            if (val.length === 0) {
                strengthDiv.textContent = '';
                isStrongPassword = false;
            } else if (strength === 3) {
                strengthDiv.textContent = 'Strong Password';
                strengthDiv.style.color = 'green';
                isStrongPassword = true;
            } else if (strength === 2) {
                strengthDiv.textContent = 'Medium Password';
                strengthDiv.style.color = 'orange';
                isStrongPassword = false;
            } else {
                strengthDiv.textContent = 'Weak Password';
                strengthDiv.style.color = 'red';
                isStrongPassword = false;
            }
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const new_password = document.getElementById('new_password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const matchError = document.getElementById('matchError');
            const submitBtn = document.getElementById('submitBtn');

            if (new_password !== confirm_password) {
                matchError.style.display = 'block';
                return;
            }
            matchError.style.display = 'none';

            if (!isStrongPassword) {
                showToast('Password must be at least 8 characters long, with letters, numbers, and special characters.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const res = await authFetch('/api/auth/change-password', {
                    method: 'POST',
                    body: JSON.stringify({ new_password, confirm_password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'Failed to update password', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Update Password';
                    return;
                }

                showToast('Password updated!', 'success');
                setTimeout(() => {
                    sessionStorage.clear();
                    window.location.href = '/';
                }, 1500);
            } catch (err) {
                showToast('An error occurred', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>
</html>
