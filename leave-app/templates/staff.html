<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Leave Approval System</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .staff-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: var(--navy); color: white; padding: 20px 0; }
        .sidebar h2 { color: white; text-align: center; margin-bottom: 30px; font-size: 20px; }
        .nav-item { padding: 15px 20px; display: block; color: #cbd5e1; cursor: pointer; transition: 0.2s; position: relative; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--accent); }
        .badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; position: absolute; right: 20px; top: 18px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .main-content { flex: 1; padding: 30px; background: var(--bg); height: 100vh; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); border-left: 4px solid; }
        .stat-card h3 { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
        .stat-card .num { font-size: 32px; font-weight: 600; color: var(--navy); }
        .stat-approved { border-color: var(--success); }
        .stat-pending { border-color: var(--accent); }
        .stat-rejected { border-color: var(--danger); }
        .leave-card { background: white; padding: 15px 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .leave-info h4 { margin-bottom: 5px; }
        .leave-info p { font-size: 14px; color: var(--muted); }
        .leave-actions { display: flex; gap: 10px; }
        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .bg-pending { background: rgba(249, 115, 22, 0.1); color: var(--accent); }
        .bg-approved { background: rgba(22, 163, 74, 0.1); color: var(--success); }
        .bg-rejected { background: rgba(220, 38, 38, 0.1); color: var(--danger); }
        .filters { display: flex; gap: 15px; margin-bottom: 20px; }
        .empty-state { text-align: center; padding: 50px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="staff-layout">
        <div class="sidebar">
            <h2>Staff Panel</h2>
            <div class="nav-item active" onclick="switchTab('dashboard')">Dashboard</div>
            <div class="nav-item" onclick="switchTab('requests')">
                Leave Requests <span class="badge" id="pendingBadge">0</span>
            </div>
            <div class="nav-item" onclick="switchTab('history')">History</div>
            <div class="nav-item" id="adminNav" style="display:none;" onclick="switchTab('admin')">Manage Staff</div>
            <div class="nav-item" onclick="logout()">Logout</div>
        </div>

        <div class="main-content">
            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content active">
                <div class="d-flex justify-between align-center">
                    <h2>Staff Dashboard</h2>
                    <span id="todayDate" style="color:var(--muted)"></span>
                </div>
                <div class="stats-grid">
                    <div class="stat-card stat-approved">
                        <h3>Approved Leaves</h3>
                        <div class="num" id="statApproved">0</div>
                    </div>
                    <div class="stat-card stat-pending">
                        <h3>Pending Requests</h3>
                        <div class="num" id="statPending">0</div>
                    </div>
                    <div class="stat-card stat-rejected">
                        <h3>Rejected Leaves</h3>
                        <div class="num" id="statRejected">0</div>
                    </div>
                </div>
            </div>

            <!-- Requests Tab -->
            <div id="tab-requests" class="tab-content">
                <h2>Leave Requests</h2>
                <div class="filters mt-4">
                    <input type="text" id="searchInput" placeholder="Search by student name..." style="max-width:300px">
                    <select id="statusFilter" style="max-width:200px">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div id="requestsList"></div>
            </div>

            <!-- History Tab -->
            <div id="tab-history" class="tab-content">
                <div class="d-flex justify-between align-center">
                    <h2>History</h2>
                    <div>
                        <button class="btn-ghost" onclick="downloadStaffPDF()">Download PDF</button>
                        <button class="btn-ghost" onclick="downloadCSV()">Download CSV</button>
                    </div>
                </div>
                <div class="filters mt-4">
                    <input type="date" id="historyFrom">
                    <input type="date" id="historyTo">
                    <button class="btn-primary" style="width:auto" onclick="loadHistory()">Apply Filter</button>
                </div>
                <div id="historyList"></div>
            </div>

            <!-- Admin Tab -->
            <div id="tab-admin" class="tab-content">
                <h2>Manage Staff</h2>
                <div class="card mt-4" style="max-width: 400px; padding: 20px;">
                    <form id="addStaffForm">
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label>Staff Email</label>
                            <input type="email" id="newStaffEmail" required style="width: 100%;">
                        </div>
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label>Temporary Password</label>
                            <input type="text" id="newStaffPassword" required style="width: 100%;" value="staff@123">
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Add Staff</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if (!sessionStorage.getItem('token')) {
            window.location.href = '/';
        }

        if (sessionStorage.getItem('email') === 'iam.rambirla@gmail.com') {
            document.getElementById('adminNav').style.display = 'block';
        }

        document.getElementById('todayDate').textContent = new Date().toDateString();

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');

            if (tabId === 'dashboard') loadStats();
            if (tabId === 'requests') loadRequests();
            if (tabId === 'history') loadHistory();
        }

        async function loadStats() {
            try {
                const res = await authFetch('/api/staff/stats');
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('statApproved').textContent = data.approved;
                    document.getElementById('statPending').textContent = data.pending;
                    document.getElementById('statRejected').textContent = data.rejected;
                    document.getElementById('pendingBadge').textContent = data.pending;
                    document.getElementById('pendingBadge').style.display = data.pending > 0 ? 'block' : 'none';
                }
            } catch(e) { console.error(e); }
        }

        async function loadRequests() {
            const status = document.getElementById('statusFilter').value;
            let url = '/api/staff/leaves';
            if(status !== 'all') url += `?status=${status}`;

            try {
                const res = await authFetch(url);
                let leaves = await res.json();
                renderRequests(leaves);
            } catch(e) { console.error(e); }
        }

        function renderRequests(leaves) {
            const container = document.getElementById('requestsList');
            container.innerHTML = '';
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if(searchTerm) {
                leaves = leaves.filter(l => l.name.toLowerCase().includes(searchTerm));
            }

            if(leaves.length === 0) {
                container.innerHTML = '<div class="empty-state">No leave requests found</div>';
                return;
            }

            leaves.forEach(leave => {
                const div = document.createElement('div');
                div.className = 'leave-card';
                
                let actionsHTML = '';
                if(leave.status === 'pending') {
                    actionsHTML = `
                        <button class="btn-approve" onclick="reviewLeave(${leave.id}, 'approve')">Approve</button>
                        <button class="btn-reject" onclick="reviewLeave(${leave.id}, 'reject')">Reject</button>
                    `;
                } else {
                    actionsHTML = `<span class="status-badge bg-${leave.status}">${leave.status.toUpperCase()}</span>`;
                }

                div.innerHTML = `
                    <div class="leave-info">
                        <h4>${leave.name} (${leave.reg_number})</h4>
                        <p>Date: <strong>${leave.date}</strong></p>
                        <p>Reason: ${leave.reason}</p>
                    </div>
                    <div class="leave-actions">
                        ${actionsHTML}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('searchInput').addEventListener('input', loadRequests);
        document.getElementById('statusFilter').addEventListener('change', loadRequests);

        async function reviewLeave(id, action) {
            showModal(`Are you sure you want to ${action} this leave request?`, async () => {
                try {
                    const res = await authFetch(`/api/staff/leaves/${id}/${action}`, { method: 'PATCH' });
                    if(res.ok) {
                        showToast(`Leave ${action}d successfully`, 'success');
                        loadRequests();
                        loadStats();
                    } else {
                        const data = await res.json();
                        showToast(data.error, 'error');
                    }
                } catch(e) { showToast('Error processing request', 'error'); }
            });
        }

        let currentHistory = [];
        async function loadHistory() {
            const from = document.getElementById('historyFrom').value;
            const to = document.getElementById('historyTo').value;
            let url = '/api/staff/history?';
            if(from) url += `from=${from}&`;
            if(to) url += `to=${to}`;

            try {
                const res = await authFetch(url);
                currentHistory = await res.json();
                renderHistory();
            } catch(e) { console.error(e); }
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = '';
            
            if(currentHistory.length === 0) {
                container.innerHTML = '<div class="empty-state">No history found</div>';
                return;
            }

            currentHistory.forEach(leave => {
                const div = document.createElement('div');
                div.className = 'leave-card';
                div.innerHTML = `
                    <div class="leave-info">
                        <h4>${leave.name} (${leave.reg_number})</h4>
                        <p>Date: <strong>${leave.date}</strong> | Reviewed: ${leave.reviewed_at}</p>
                    </div>
                    <span class="status-badge bg-${leave.status}">${leave.status.toUpperCase()}</span>
                `;
                container.appendChild(div);
            });
        }

        function downloadCSV() {
            if(currentHistory.length === 0) {
                showToast('No data to download', 'info');
                return;
            }

            let csv = 'ID,Name,Register Number,Date,Reason,Status,Reviewed At\n';
            currentHistory.forEach(r => {
                csv += `${r.id},"${r.name}",${r.reg_number},${r.date},"${r.reason}",${r.status},${r.reviewed_at}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'leave_history.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function downloadStaffPDF() {
            const element = document.getElementById('historyList');
            if(!element || element.children.length === 0 || element.querySelector('.empty-state')) {
                showToast('No data to download', 'info');
                return;
            }
            const opt = {
                margin:       1,
                filename:     'Staff_Leave_History.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        document.getElementById('addStaffForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('newStaffEmail').value;
            const temp_password = document.getElementById('newStaffPassword').value;
            try {
                const res = await authFetch('/api/staff/add-staff', {
                    method: 'POST',
                    body: JSON.stringify({ email, temp_password })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('Staff added successfully!', 'success');
                    document.getElementById('addStaffForm').reset();
                } else {
                    showToast(data.error || 'Failed to add staff', 'error');
                }
            } catch (err) {
                showToast('Error adding staff', 'error');
            }
        });

        // Initial load
        loadStats();
    </script>
</body>
</html>
