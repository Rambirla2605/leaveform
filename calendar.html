<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calendar</title>

  <link rel="stylesheet" href="calender.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="app.js" defer></script>
</head>

<body>

  <div class="wrapper">

    <header>
      <p class="current-date"></p>
      <div class="icons">
        <span id="prev">&#10094;</span>
        <span id="next">&#10095;</span>
      </div>
    </header>

    <div class="calendar">

      <ul class="weeks">
        <li>Sun</li>
        <li>Mon</li>
        <li>Tue</li>
        <li>Wed</li>
        <li>Thu</li>
        <li>Fri</li>
        <li>Sat</li>
      </ul>

      <ul class="days"></ul>

    </div>

    <!-- Leave Section -->
    <div class="leave-box">
      <textarea id="reason" placeholder="Enter reason"></textarea>
      <button onclick="submitLeave()">Submit Leave</button>
    </div>

  </div>

</body>
</html>
